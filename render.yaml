services:
  # Backend API (FastAPI)
  - type: web
    name: ai-personal-cfo-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEFAULT_PROVIDER
        value: auto
      # Render will prompt you for these values when applying the blueprint
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        # We will use * for initial testing. Once deployed, update this to your frontend URL.
        value: "*"

  # Frontend Web App (Vite/React)
  - type: web
    name: ai-personal-cfo-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: ai-personal-cfo-backend
          envVarKey: RENDER_EXTERNAL_URL
    # Rewrite rules for Single Page Application routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
